<!DOCTYPE html>
<html lang="bn"><head>

        .progress-section p { font-size: 18px; font-weight: 600; margin-bottom: 10px; }
        .progress-section p span { color: #e31837; }

        .calendar-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; }
        .day-card { background-color: #ffffff; border: 2px solid #e31837; color: #000000; padding: 20px 0; text-align: center; border-radius: 10px; font-weight: 600; font-size: 16px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(5px); }

        .task-details { margin: 20px 0; color: #333; font-size: 15px; }
        .task-item { display: flex; align-items: flex-start; margin-bottom: 15px; background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .task-checkbox { margin-top: 4px; margin-right: 12px; width: 18px; height: 18px; cursor: pointer; accent-color: #e31837; }
        .task-label { cursor: pointer; line-height: 1.6; flex: 1; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
        .close-btn, .complete-btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: 'Poppins', sans-serif; transition: 0.3s; }

        .close-btn:hover { background: #e2e8f0; }
        .complete-btn { background: #e31837; color: white; }
        .complete-btn:hover { background: #b21029; }
        @media (max-width: 768px) {
            .calendar-grid { grid-template-columns: repeat(4, 1fr); }

            .header-right { margin-top: 15px; }
            .school-name { border: none; padding: 0; }
            .container { margin-top: 130px; }

</head>
